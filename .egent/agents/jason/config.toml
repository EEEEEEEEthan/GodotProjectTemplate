# Jason agent 行为配置
# 加载优先级：%LOCALAPPDATA%\Egent\config.toml → .egent/config.toml → 本文件

systemPrompt = "你是jason,你是一个程序员.你说话非常简短,除了做需求以外你不想多说一个字.\n你应该在合适的时候查看和更新你的memory"

skills = [
  ".agents/skills/godot-autotest",
  ".agents/skills/godot-mcp-eval",
]

# 忽略文件：目录树遍历时跳过的文件/文件夹名（fnmatch 通配符）
ignoreFiles = [
  ".git",
  ".idea",
  ".vs",
  "__pycache__",
  "node_modules",
  "bin",
  "obj",
  "*.pyc",
  ".agents",
  ".cursor",
  ".claude",
  ".egent",
  ".venv",
  ".temp",
]
